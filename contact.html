<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <!--=============== FAVICON ===============-->
    <link rel="icon" type="image/jpeg" href="assets/favicons/fav2.jpg">
    <link rel="shortcut icon" href="assets/favicons/fav2.jpg">

    <!--=============== BOXICONS ===============-->
    <link href='https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css' rel='stylesheet'>

    <!--=============== SWIPER CSS ===============-->
    <link rel="stylesheet" href="assets/css/swiper-bundle.min.css">

    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="assets/css/styles.css">

    <title> LIBA </title>
</head>

<body>
    <!--=============== CUSTOM CURSOR ===============-->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <!--=============== HEADER ===============-->
    <header class="header" id="header">
        <nav class="nav container">
            <a href="index.html" class="nav__logo">LBS</a>

            <div class="nav__menu">
                <ul class="nav__list">
                    <li class="nav__item">
                        <a href="index.html" class="nav__link">
                            <i class='bx bx-home'></i>
                        </a>
                    </li>

                    <li class="nav__item">
                        <a href="portfolio.html" class="nav__link">
                            <i class='bx bx-briefcase-alt-2'></i>
                        </a>
                    </li>

                    <li class="nav__item">
                        <a href="expertise.html" class="nav__link">
                            <i class='bx bx-book'></i>
                        </a>
                    </li>

                    <li class="nav__item">
                        <a href="contact.html" class="nav__link active-link">
                            <i class='bx bx-message-square-dots'></i>
                        </a>
                    </li>
                </ul>
            </div>

            <!-- Theme change button -->
            <i class='bx bx-moon change-theme' id="theme-button"></i>
        </nav>
    </header>

    <!--=============== MAIN ===============-->
    <main class="main">
        <!--=============== CONTACT ===============-->
        <section class="contact section" id="contact">
            <h3 class="section__title">Contact Me</h3>

            <div class="contact__container container grid">
                <div class="contact__content contact__content--form">
                    <div class="contact__methods">
                        <a href="mailto:LBS_DEV@zohomail.com" class="contact__method">
                            <i class='bx bx-envelope'></i>
                            <span>LBS_DEV@zohomail.com</span>
                        </a>
                        <a href="https://api.whatsapp.com/send?phone=+233264084871" target="_blank" class="contact__method">
                            <i class='bx bxl-whatsapp'></i>
                            <span>+233 264084871</span>
                        </a>
                    </div>

                    <form action="" class="contact__form">
                        <div class="contact__form-row">
                            <div class="contact__form-div">
                                <label class="contact__form-tag">Name</label>
                                <input type="text" placeholder="Your name" class="contact__form-input">
                            </div>
                            <div class="contact__form-div">
                                <label class="contact__form-tag">Email</label>
                                <input type="email" placeholder="your@email.com" class="contact__form-input">
                            </div>
                        </div>

                        <div class="contact__form-div">
                            <label class="contact__form-tag">Subject</label>
                            <input type="text" placeholder="Project inquiry" class="contact__form-input">
                        </div>

                        <div class="contact__form-div contact__form-area">
                            <label class="contact__form-tag">Message</label>
                            <textarea cols="30" rows="6" placeholder="Tell me about your project..."
                                class="contact__form-input"></textarea>
                        </div>

                        <button class="button contact__button-send">
                            Send Message
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <!--=============== FOOTER ===============-->
    <footer class="footer">
        <div class="footer__container container">
            <h1 class="footer__title">LIBA</h1>

            <ul class="footer__list">
                <li class="footer__item">
                    <a href="index.html" class="footer__link">Home</a>
                </li>
                <li class="footer__item">
                    <a href="portfolio.html" class="footer__link">Portfolio</a>
                </li>
                <li class="footer__item">
                    <a href="expertise.html" class="footer__link">Expertise</a>
                </li>
                <li class="footer__item">
                    <a href="contact.html" class="footer__link">Contact</a>
                </li>
            </ul>

            <ul class="footer__social">
                <li class="footer__social-item">
                    <a href="https://wa.me/" target="_blank" class="footer__social-link">
                        <i class='bx bxl-facebook footer__social-icon'></i>
                    </a>
                </li>
                <li class="footer__social-item">
                    <a href="https://wa.me/" target="_blank" class="footer__social-link">
                        <i class='bx bxl-whatsapp footer__social-icon'></i>
                    </a>
                </li>
                <li class="footer__social-item">
                    <a href="https://wa.me/" target="_blank" class="footer__social-link">
                        <i class='bx bxl-linkedin footer__social-icon'></i>
                    </a>
                </li>
                <li class="footer__social-item">
                    <a href="https://wa.me/" target="_blank" class="footer__social-link">
                        <i class='bx bxl-instagram footer__social-icon'></i>
                    </a>
                </li>
            </ul>

            <span class="footer__copy">
                &#169; 2026 LBS. All rights reserved.
            </span>
        </div>
    </footer>

    <!--=============== SCROLLREVEAL ===============-->
    <script src="assets/js/scrollreveal.min.js"></script>

    <!--=============== SWIPER JS ===============-->
    <script src="assets/js/swiper-bundle.min.js"></script>

    <!--=============== MIXITUP FILTER ===============-->
    <script src="assets/js/mixitup.min.js"></script>

    <!--=============== LENIS SMOOTH SCROLL ===============-->
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <!--=============== VANILLA TILT 3D ===============-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>

    <!--=============== MAIN JS ===============-->
    <script src="assets/js/main.js"></script>
</body>

</html>
